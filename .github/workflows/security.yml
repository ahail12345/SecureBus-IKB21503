name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install bandit pip-audit

    - name: Run Bandit SAST
      run: bandit -r core/ -f txt

    - name: Run pip-audit SCA
      run: pip-audit