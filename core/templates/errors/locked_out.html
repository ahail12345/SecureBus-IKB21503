<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Account Locked — SecureBus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body{background:#1a2332;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;}</style>
</head>
<body>
  <div class="text-center">
    <div style="font-size:4rem">🔒</div>
    <h2 class="fw-bold text-warning mt-3">Account Temporarily Locked</h2>

  </div>
